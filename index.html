<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>Recibo — IBEA / AMAPES</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0c101a;--bg2:#141926;--bg3:#1a2035;--bg4:#222940;--tx:#e8ecf4;--tx2:#a0aabe;--tx3:#6b7894;--bd:#2a3250;--gold:#c8963e;--gold2:#d4a94f;--gold3:rgba(200,150,62,.15);--red:#e53e3e;--green:#38a169;--blue:#5b9bf5;--radius:10px}
.light{--bg:#f0f2f5;--bg2:#fff;--bg3:#fff;--bg4:#eef0f5;--tx:#1a202c;--tx2:#4a5568;--tx3:#8892a8;--bd:#dde1ea;--gold:#b07e2a;--gold2:#c8963e;--gold3:rgba(200,150,62,.1)}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
@media print{body{background:#fff!important;min-height:0!important}}
.hdr{background:var(--bg2);border-bottom:1px solid var(--bd);padding:10px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.hdr-icon{width:36px;height:36px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#0c101a;flex-shrink:0}
.hdr h1{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:700;line-height:1.1}
.hdr-sub{font-size:8px;color:var(--gold);letter-spacing:1.2px;text-transform:uppercase}
.hdr-r{margin-left:auto;display:flex;gap:6px;align-items:center}
.tbtn{background:var(--bg3);border:1px solid var(--bd);color:var(--tx2);padding:5px 10px;border-radius:16px;font-size:10px;cursor:pointer;font-family:inherit;font-weight:600}
.tbtn:hover{border-color:var(--gold);color:var(--gold)}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block;animation:pu 2s infinite}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.3}}
.nav{display:flex;background:var(--bg2);border-bottom:1px solid var(--bd);overflow-x:auto;padding:0 8px}
.nav button{background:none;border:none;color:var(--tx3);padding:9px 14px;cursor:pointer;font-size:11px;font-weight:600;white-space:nowrap;border-bottom:2.5px solid transparent;font-family:inherit}
.nav button:hover{color:var(--tx)}.nav button.on{color:var(--gold);border-bottom-color:var(--gold)}
.cnt{padding:14px;max-width:860px;margin:0 auto}
.sec{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.sec-t{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:700;color:var(--gold);margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid var(--bd)}
.g{display:grid;gap:8px}.g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:1fr 1fr 1fr}.g4{grid-template-columns:1fr 1fr 1fr 1fr}
.f{display:flex;flex-direction:column;gap:2px}
.f label{font-size:9px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px}
.f input,.f textarea{padding:8px 10px;border:1.5px solid var(--bd);border-radius:7px;font-size:13px;font-family:inherit;background:var(--bg3);color:var(--tx);transition:.15s;width:100%}
.f input:focus,.f textarea:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px var(--gold3)}
.f input::placeholder{color:var(--tx3);font-size:12px}
.f textarea{min-height:50px;resize:vertical}
.f-ok input{border-color:var(--green)!important}.f-ok .fh{color:var(--green)}
.f-err input{border-color:var(--red)!important}.f-err .fh{color:var(--red)}
.fh{font-size:9px;margin-top:1px;font-weight:600}
.btn{padding:10px 18px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;font-family:inherit;transition:.15s}
.bp{background:var(--gold);color:#0c101a}.bp:hover{background:var(--gold2)}
.bn{background:var(--bg4);border:1px solid var(--bd);color:var(--tx)}.bn:hover{border-color:var(--gold);color:var(--gold)}
.bo{background:transparent;border:1.5px solid var(--bd);color:var(--tx2)}.bo:hover{border-color:var(--gold);color:var(--gold)}
.bd{background:var(--red);color:#fff}
.bs{padding:5px 10px;font-size:10px}
.br{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;justify-content:center}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:var(--bg4);color:var(--gold);padding:8px;text-align:left;font-weight:600;font-size:10px;text-transform:uppercase;border-bottom:1px solid var(--bd)}
td{padding:8px;border-bottom:1px solid var(--bd);color:var(--tx2)}
tr:hover td{background:var(--bg3)}
.sb{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.sb input{flex:1;min-width:160px;padding:9px 12px;border:1.5px solid var(--bd);border-radius:7px;font-size:13px;font-family:inherit;background:var(--bg3);color:var(--tx)}.sb input:focus{outline:none;border-color:var(--gold)}
.empty{text-align:center;padding:36px;color:var(--tx3);font-size:13px}
@media(max-width:640px){.g2,.g3,.g4{grid-template-columns:1fr 1fr}}
@media(max-width:420px){.g2,.g3,.g4{grid-template-columns:1fr}}
</style>
</head>

function mDoc(v){
  var d=v.replace(/\D/g,'');
  if(d.length<=11){
    d=d.slice(0,11);
    if(d.length>9)return d.replace(/(\d{3})(\d{3})(\d{3})(\d{1,2})/,'$1.$2.$3-$4');
    if(d.length>6)return d.replace(/(\d{3})(\d{3})(\d{1,3})/,'$1.$2.$3');
    if(d.length>3)return d.replace(/(\d{3})(\d{1,3})/,'$1.$2');
    return d;
  }
  d=d.slice(0,14);
  if(d.length>12)return d.replace(/(\d{2})(\d{3})(\d{3})(\d{4})(\d{1,2})/,'$1.$2.$3/$4-$5');
  if(d.length>8)return d.replace(/(\d{2})(\d{3})(\d{3})(\d{1,4})/,'$1.$2.$3/$4');
  if(d.length>5)return d.replace(/(\d{2})(\d{3})(\d{1,3})/,'$1.$2.$3');
  if(d.length>2)return d.replace(/(\d{2})(\d{1,3})/,'$1.$2');
  return d;
}
function mCEP(v){v=v.replace(/\D/g,'').slice(0,8);return v.length>5?v.replace(/(\d{5})(\d+)/,'$1-$2'):v;}
function mMoney(v){v=v.replace(/\D/g,'');if(!v)return'';return(parseInt(v)/100).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
function parseVal(s){if(!s)return 0;return parseFloat(s.replace(/\./g,'').replace(',','.'))||0;}

function validaCPF(v){
  var c=v.replace(/\D/g,'');
  if(c.length!==11)return false;
  if(/^(\d)\1{10}$/.test(c))return false;
  var s=0;for(var i=0;i<9;i++)s+=parseInt(c.charAt(i))*(10-i);
  var r=11-(s%11);var d1=r>=10?0:r;
  if(parseInt(c.charAt(9))!==d1)return false;
  s=0;for(var i=0;i<10;i++)s+=parseInt(c.charAt(i))*(11-i);
  r=11-(s%11);var d2=r>=10?0:r;
  return parseInt(c.charAt(10))===d2;
}

function validaCNPJ(v){
  var c=v.replace(/\D/g,'');
  if(c.length!==14)return false;
  if(/^(\d)\1{13}$/.test(c))return false;
  var pesos1=[5,4,3,2,9,8,7,6,5,4,3,2];
  var s=0;for(var i=0;i<12;i++)s+=parseInt(c.charAt(i))*pesos1[i];
  var r=s%11;var d1=r<2?0:11-r;
  if(parseInt(c.charAt(12))!==d1)return false;
  var pesos2=[6,5,4,3,2,9,8,7,6,5,4,3,2];
  s=0;for(var i=0;i<13;i++)s+=parseInt(c.charAt(i))*pesos2[i];
  r=s%11;var d2=r<2?0:11-r;
  return parseInt(c.charAt(13))===d2;
}

async function buscaCEP(c){
  c=c.replace(/\D/g,'');if(c.length!==8)return null;
  try{var r=await fetch('https://viacep.com.br/ws/'+c+'/json/');var d=await r.json();return d.erro?null:d;}catch(e){return null;}
}

function extenso(valor){
  var un=['','um','dois','tr\u00eas','quatro','cinco','seis','sete','oito','nove','dez','onze','doze','treze','quatorze','quinze','dezesseis','dezessete','dezoito','dezenove'];
  var dz=['','','vinte','trinta','quarenta','cinquenta','sessenta','setenta','oitenta','noventa'];
  var ct=['','cento','duzentos','trezentos','quatrocentos','quinhentos','seiscentos','setecentos','oitocentos','novecentos'];
  function g(n){if(n===0)return'';if(n===100)return'cem';var s='';if(n>=100){s+=ct[Math.floor(n/100)];n%=100;if(n>0)s+=' e ';}if(n>=20){s+=dz[Math.floor(n/10)];n%=10;if(n>0)s+=' e ';}if(n>0)s+=un[n];return s;}
  var v=Math.round(valor*100)/100,inteiro=Math.floor(v),centavos=Math.round((v-inteiro)*100),r='';
  if(inteiro===0)r='zero reais';
  else if(inteiro>=1000000){var mi=Math.floor(inteiro/1000000),resto=inteiro%1000000;r=(mi===1?'um milh\u00e3o':g(mi)+' milh\u00f5es');if(resto>0){var ml=Math.floor(resto/1000),u=resto%1000;if(ml>0)r+=' '+(ml===1?'mil':g(ml)+' mil');if(u>0)r+=' e '+g(u);}r+=' reais';}
  else if(inteiro>=1000){var ml=Math.floor(inteiro/1000),u=inteiro%1000;r=(ml===1?'mil':g(ml)+' mil');if(u>0)r+=' e '+g(u);r+=' reais';}
  else r=g(inteiro)+(inteiro===1?' real':' reais');
  if(centavos>0)r+=' e '+g(centavos)+(centavos===1?' centavo':' centavos');
  return r;
}

            d.className='f '+(ok?'f-ok':'f-err');
            var hh=document.createElement('div');hh.className='fh';
            hh.textContent=(ok?'\u2713 CPF v\u00e1lido':'\u2715 CPF inv\u00e1lido');
            d.appendChild(hh);
          } else if(raw.length===14){
            var ok=validaCNPJ(v);
            d.className='f '+(ok?'f-ok':'f-err');
            var hh=document.createElement('div');hh.className='fh';
            hh.textContent=(ok?'\u2713 CNPJ v\u00e1lido':'\u2715 CNPJ inv\u00e1lido');
            d.appendChild(hh);
          }
        }}});
      d.appendChild(inp);
      return d;
    })()
  ));

  // CEP + Endere\u00e7o (opcional)
  var addrSec=h('div',{style:{marginTop:'10px',padding:'10px',border:'1px dashed var(--bd)',borderRadius:'8px'}});
  addrSec.appendChild(h('div',{style:{fontSize:'10px',color:'var(--tx3)',marginBottom:'8px',fontWeight:'600'}},'ENDERE\u00c7O (opcional)'));
  addrSec.appendChild(h('div',{className:'g g3'},
    // CEP com busca
    (function(){
      var d=h('div',{className:'f'});
      d.appendChild(h('label',null,'CEP'));
      var inp=h('input',{value:V.cep||'',placeholder:'00000-000',on:{
        input:async function(e){
          var v=mCEP(e.target.value);
          e.target.value=v;V.cep=v;
          if(v.replace(/\D/g,'').length===8){
            var data=await buscaCEP(v);
            if(data){
              V.rua=data.logradouro||'';V.bairro=data.bairro||'';V.cidade=data.localidade||'';V.estado=data.uf||'';
              render();
            }
          }
        }}});
      d.appendChild(inp);return d;
    })(),
    mkF('Rua / Avenida','rua'),
    mkF('N\u00ba','nr')
  ));
  addrSec.appendChild(h('div',{className:'g g4',style:{marginTop:'8px'}},
    mkF('Complemento','complemento'),
    mkF('Bairro','bairro'),
    mkF('Cidade','cidade'),
    mkF('Estado','estado')
  ));
  s1.appendChild(addrSec);
  w.appendChild(s1);

  // === RECIBO ===
  var s2=h('div',{className:'sec'});
  s2.appendChild(h('div',{className:'sec-t'},'Dados do Recibo'));
  s2.appendChild(h('div',{className:'g g2'},
    mkF('Valor (R$)','valor',{ph:'0,00',mask:'money'}),
    (function(){
      var d=h('div',{className:'f'});d.appendChild(h('label',null,'Data'));
      var inp=h('input',{type:'date',value:V.data||'',on:{change:function(e){V.data=e.target.value;}}});
      d.appendChild(inp);return d;
    })()
  ));
  var taDiv=h('div',{className:'f'});
  taDiv.appendChild(h('label',null,'Referente ao pagamento de'));
  var ta=h('textarea',{value:V.descricao||'',on:{input:function(e){V.descricao=e.target.value;}}});
  taDiv.appendChild(ta);
  s2.appendChild(h('div',{style:{marginTop:'8px'}},taDiv));
  w.appendChild(s2);

  // Info fixa
  var s3=h('div',{className:'sec',style:{background:'var(--bg3)',border:'1px dashed var(--bd)'}});
  s3.appendChild(h('div',{style:{fontSize:'11px',color:'var(--tx3)',lineHeight:'1.6'},innerHTML:'<b style="color:var(--gold)">Dados fixos:</b><br>Benefici\u00e1rio: Associa\u00e7\u00e3o M\u00e3e de Pentecostes (Em Adora\u00e7\u00e3o)<br>CNPJ: 21.269.210/0001-50<br>Chave Pix: eventos@emadoracao.org'}));
  w.appendChild(s3);

  // Bot\u00f5es
  w.appendChild(h('div',{className:'br',style:{padding:'16px 0 40px'}},
    h('button',{className:'btn bp',style:{padding:'14px 32px',fontSize:'14px'},on:{click:function(){
      if(!V.razaoSocial){alert('Preencha a Raz\u00e3o Social');return;}
      if(!V.valor){alert('Preencha o valor');return;}
      var rec={id:uid(),razaoSocial:V.razaoSocial,cnpj:V.cnpj,cep:V.cep,rua:V.rua,nr:V.nr,complemento:V.complemento,bairro:V.bairro,cidade:V.cidade,estado:V.estado,valor:V.valor,descricao:V.descricao,data:V.data,createdAt:new Date().toISOString()};
      D.recibos.push(rec);save();PREC=rec;resetV();render();
    }}},'Salvar e Imprimir'),
    h('button',{className:'btn bo',on:{click:function(){resetV();render();}}},'Limpar')
  ));
  return w;
}

// === HIST\u00d3RICO ===
function renderHist(){
  var w=h('div');
  w.appendChild(h('div',{className:'sb'},h('input',{placeholder:'Buscar pagador...',value:SEARCH,on:{input:function(e){SEARCH=e.target.value;render();}}})));
  var recs=D.recibos.filter(function(r){return!SEARCH||(r.razaoSocial||'').toLowerCase().indexOf(SEARCH.toLowerCase())>=0;}).sort(function(a,b){return(b.createdAt||'').localeCompare(a.createdAt||'');});
  if(!recs.length){w.appendChild(h('div',{className:'sec'},h('div',{className:'empty'},'Nenhum recibo emitido')));return w;}
  var sec=h('div',{className:'sec'}),tw=h('div',{className:'tw'}),tb=h('table');
  tb.appendChild(h('thead',null,h('tr',null,h('th',null,'Data'),h('th',null,'Pagador'),h('th',null,'Valor'),h('th',null,''))));
  var tbody=h('tbody');
  recs.forEach(function(r){
    var dt=r.data?r.data.split('-').reverse().join('/'):'--';
    tbody.appendChild(h('tr',null,
      h('td',null,dt),
      h('td',{style:{fontWeight:'600',color:'var(--tx)'}},r.razaoSocial||'--'),
      h('td',{style:{color:'var(--green)',fontWeight:'600'}},'R$ '+(r.valor||'0,00')),
      h('td',{style:{display:'flex',gap:'4px'}},
        h('button',{className:'btn bs bn',on:{click:function(){PREC=r;render();}}},'Imprimir'),
        h('button',{className:'btn bs bd',on:{click:function(){if(confirm('Remover?')){D.recibos=D.recibos.filter(function(x){return x.id!==r.id;});save();render();}}}},'X')
    )));
  });
  tb.appendChild(tbody);tw.appendChild(tb);sec.appendChild(tw);w.appendChild(sec);return w;
}

// === PRINT ===
function renderPrint(){
  var r=PREC;
  var vn=parseVal(r.valor),vx=extenso(vn);
  var dt=r.data?r.data.split('-'):[];
  var meses=['','janeiro','fevereiro','mar\u00e7o','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
  var dtxt=dt.length===3?'Jo\u00e3o Pessoa/PB, '+parseInt(dt[2])+' de '+meses[parseInt(dt[1])]+' de '+dt[0]+'.':'Jo\u00e3o Pessoa/PB, ___ de __________ de 20___.';
  var endParts=[];
  if(r.rua)endParts.push(r.rua);
  if(r.nr)endParts.push(r.nr);
  if(r.complemento)endParts.push(r.complemento);
  var endLinha=endParts.join(', ');
  if(r.bairro)endLinha+=(endLinha?', ':'')+r.bairro;
  var cidadeUF=(r.cidade||'')+(r.estado?'/'+r.estado:'');
  var hasEnd=endLinha||cidadeUF;
  var endTexto='';
  if(hasEnd){
    endTexto=' | '+(endLinha||'')+(endLinha&&cidadeUF?' \u2013 ':'')+cidadeUF;
  }

  var app=document.getElementById('app');
  app.innerHTML=
  '<style>'+
  '.rv{font-family:"DM Sans",sans-serif;background:#fff;color:#152347;padding:20mm 25mm;font-size:12px;position:relative;max-width:210mm;margin:0 auto;-webkit-print-color-adjust:exact;print-color-adjust:exact}'+
  '.rv-bar{background:#152347;padding:10px 16px;display:flex;align-items:center;gap:12px;margin:-20mm -25mm 0 -25mm;position:sticky;top:0;z-index:10}'+
  '.rv-bar span{color:#c8963e;font-size:13px;font-weight:600;flex:1}'+
  '.rv-bar button{padding:10px 24px;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:"DM Sans",sans-serif}'+
  '.rv-bar .rpb{background:#c8963e;color:#0c101a}'+
  '.rv-bar .rvb{background:transparent;border:1px solid rgba(255,255,255,.5);color:#fff}'+
  '.rv-wm{position:absolute;top:45%;left:50%;transform:translate(-50%,-50%);opacity:.04;z-index:0;pointer-events:none}'+
  '.rv-wm img{width:280px;height:280px;border-radius:50%}'+
  '.rv-hdr{display:flex;justify-content:space-between;align-items:flex-start;padding-top:6mm;margin-bottom:10mm;position:relative;z-index:1}'+
  '.rv-title{text-align:center;font-family:"Cormorant Garamond",serif;font-size:18px;font-weight:700;text-decoration:underline;text-underline-offset:3px;margin-bottom:8mm;position:relative;z-index:1;letter-spacing:2px}'+
  '.rv-valor{text-align:right;font-size:15px;font-weight:700;margin-bottom:8mm;position:relative;z-index:1}'+
  '.rv-body{text-align:justify;font-size:12px;line-height:1.9;margin-bottom:5mm;position:relative;z-index:1}'+
  '.rv-body b{font-weight:700}'+
  '.rv-fecho{font-size:12px;line-height:1.8;position:relative;z-index:1}'+
  '.rv-date{text-align:right;font-size:12px;margin:8mm 0;position:relative;z-index:1}'+
  '.rv-sig{text-align:center;position:relative;z-index:1;margin-top:12mm}'+
  '.rv-sig-line{border-top:1px solid #152347;width:55%;margin:0 auto;padding-top:2mm}'+
  '.rv-sig-name{font-size:11px;font-weight:600;margin-top:1mm}'+
  '.rv-sig-cnpj{font-size:10px;color:#4a6fa5}'+
  '@media print{.rv-bar{display:none!important}body{background:#fff!important}@page{size:A4;margin:20mm 25mm}.rv{padding:0;max-width:none;-webkit-print-color-adjust:exact;print-color-adjust:exact}}'+
  '</style>'+
  '<div class="rv">'+
    '<div class="rv-bar">'+
      '<span>Recibo</span>'+
      '<button class="rpb" onclick="window.print()">Imprimir / Salvar PDF</button>'+
      '<button class="rvb" id="btn-voltar">\u2190 Voltar</button>'+
    '</div>'+
    '<div class="rv-wm"><img src="'+IMG_WM+'" alt=""></div>'+
    '<div class="rv-hdr">'+
      '<img src="'+IMG_AM+'" style="height:20mm;filter:drop-shadow(0 0 1px rgba(0,0,0,.1))" alt="">'+
      '<img src="'+IMG_LG+'" style="height:16mm" alt="">'+
    '</div>'+
    '<div class="rv-title">RECIBO</div>'+
    '<div class="rv-valor">R$'+(r.valor||'0,00')+'</div>'+
    '<div class="rv-body">'+
      'Recebi da <b>'+(r.razaoSocial||'_______________')+'</b> | CNPJ: '+
      (r.cnpj||'__.__.___.____/____-__')+
      endTexto+
      ', a import\u00e2ncia de R$ '+(r.valor||'____')+
      ' ('+vx+'), referente ao pagamento do <b>'+
      (r.descricao||'_______________')+'</b>. O cr\u00e9dito correspondente, ap\u00f3s dedu\u00e7\u00f5es legais, dever\u00e1 ser efetuado por meio da Chave Pix <b>eventos@emadoracao.org</b> de titularidade <b>Associa\u00e7\u00e3o M\u00e3e de Pentecostes (Em Adora\u00e7\u00e3o)</b>, CNPJ n.\u00ba <b>21.269.210/0001-50</b>.'+
    '</div>'+
    '<div class="rv-fecho">Por ser verdade, datamos e assinamos na forma da legisla\u00e7\u00e3o vigente.</div>'+
    '<div class="rv-date">'+dtxt+'</div>'+
    '<div class="rv-sig">'+
      '<div class="rv-sig-line">&nbsp;</div>'+
      '<div class="rv-sig-name">Associa\u00e7\u00e3o M\u00e3e de Pentecostes</div>'+
      '<div class="rv-sig-cnpj">CNPJ: 21.269.210/0001-50</div>'+
    '</div>'+
  '</div>';
  document.getElementById('btn-voltar').addEventListener('click',function(){PREC=null;render();});
  window.scrollTo(0,0);
}

load();render();
</script>
